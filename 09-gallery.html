<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Baxstar Fishing</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #08080a;
  --charcoal: #111114;
  --dark: #18181c;
  --mid-dark: #222228;
  --red: #c1272d;
  --red-bright: #e63946;
  --red-deep: #8b1a1f;
  --cream: #f0ece4;
  --warm-white: #faf8f4;
  --gold: #c9a84c;
  --gold-dim: #9a7d3a;
  --slate: #6b6b78;
  --light-slate: #9a9aaa;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --font-accent: 'Cormorant Garamond', serif;
  --max-w: 1320px;
  --section-pad: clamp(80px, 10vw, 140px);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--black);
  color: var(--cream);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

.container { max-width: var(--max-w); margin: 0 auto; padding: 0 clamp(20px, 4vw, 60px); }

/* Shared buttons */
.btn-primary {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 17px 38px;
  background: var(--red); color: white;
  font-family: var(--font-body); font-weight: 600; font-size: 13px;
  letter-spacing: 2px; text-transform: uppercase;
  border: none; cursor: pointer;
  transition: all 0.3s ease; position: relative; overflow: hidden;
}
.btn-primary::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.btn-primary:hover {
  background: var(--red-bright); transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(193, 39, 45, 0.45);
}
.btn-primary:hover::after { opacity: 1; }

.btn-ghost {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 17px 32px;
  background: transparent; color: var(--cream);
  font-family: var(--font-body); font-weight: 500; font-size: 13px;
  letter-spacing: 2px; text-transform: uppercase;
  border: 1px solid rgba(240,236,228,0.2);
  cursor: pointer; transition: all 0.3s ease;
}
.btn-ghost:hover {
  border-color: rgba(240,236,228,0.55);
  background: rgba(240,236,228,0.05);
}

/* Shared section elements */
.section-tag {
  font-family: var(--font-body); font-weight: 500;
  font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--red-bright); margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px;
}
.section-tag::before {
  content: ''; width: 24px; height: 1px; background: var(--red);
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 5vw, 56px);
  line-height: 1; letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--warm-white);
  margin-bottom: 28px;
}
.section-title span { color: var(--red-bright); }

/* Scroll reveal */
.reveal {
  opacity: 0; transform: translateY(28px);
  transition: opacity 0.85s ease, transform 0.85s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }


.gallery { padding: var(--section-pad) 0 0; position: relative; }
.gallery__header {
  text-align: center; margin-bottom: clamp(40px, 5vw, 60px);
}
.gallery__grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, 280px); gap: 4px;
}
.gallery__item { overflow: hidden; position: relative; cursor: pointer; }
.gallery__item:nth-child(1) { grid-column: span 2; grid-row: span 2; }
.gallery__item img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.65s ease;
}
.gallery__item:hover img { transform: scale(1.07); }
.gallery__item::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(8,8,10,0.1);
  opacity: 0; transition: opacity 0.35s;
}
.gallery__item:hover::after {
  opacity: 1; background: rgba(193,39,45,0.08);
}
@media (max-width: 1024px) {
  .gallery__grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
  .gallery__item:nth-child(1) { grid-column: span 2; }
}
@media (max-width: 640px) {
  .gallery__grid { grid-template-columns: 1fr; }
  .gallery__item:nth-child(1) { grid-column: span 1; }
}

</style>
</head>
<body>


<section class="gallery">
  <div class="container">
    <div class="gallery__header reveal">
      <div class="section-tag" style="justify-content: center;">From the Water</div>
      <h2 class="section-title">REAL CATCHES. <span>REAL CLIENTS.</span></h2>
    </div>
  </div>
  <div class="gallery__grid reveal">
    <div class="gallery__item"><img src="IMG_3997.jpeg" alt="Trophy bass catch on Detroit Lakes"></div>
    <div class="gallery__item"><img src="IMG_9106.JPG" alt="Northern pike catch with Baxstar Fishing"></div>
    <div class="gallery__item"><img src="IMG_3070.jpeg" alt="Walleye fishing trip Detroit Lakes"></div>
    <div class="gallery__item"><img src="IMG_0282.jpeg" alt="Baxstar Fishing client with catch"></div>
    <div class="gallery__item"><img src="IMG_5826.jpeg" alt="Sunset on Detroit Lakes"></div>
  </div>
</section>


<script>
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 80);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
  reveals.forEach(el => observer.observe(el));
</script>

</body>
</html>
